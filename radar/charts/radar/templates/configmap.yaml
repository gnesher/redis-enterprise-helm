apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "radar.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "radar.labels" . | nindent 4 }}
data:
  # Shared by both the API server and the worker
  APP_ENV: {{ .Values.app.appEnv | quote }}
  RADAR_DEPLOY_MODE: {{ .Values.deployMode | quote }}
  OSS_ENABLED: {{ .Values.app.ossEnabled | toString | quote }}
  CLOUD_ENABLED: {{ .Values.app.cloudEnabled | toString | quote }}
  CLOUD_API_BASE_URL: {{ .Values.app.cloudApiBaseUrl | quote }}
  {{- if eq .Values.deployMode "cloud" }}
  RADAR_HOSTNAME: {{ .Values.cloudAuth.radarHostname | quote }}
  CLOUD_AUTH_JWKS_URL: {{ .Values.cloudAuth.jwksURL | quote }}
  CLOUD_AUTH_ISSUER: {{ .Values.cloudAuth.issuer | quote }}
  LOGIN_REDIRECT_URL: {{ .Values.cloudAuth.loginRedirectURL | quote }}
  {{- end }}

  # RE cluster polling intervals
  RE_ACTIONS_POLL_INTERVAL: {{ .Values.app.pollerIntervals.actions | quote }}
  RE_CRDBS_POLL_INTERVAL: {{ .Values.app.pollerIntervals.crdbs | quote }}
  RE_HEALTH_POLL_INTERVAL: {{ .Values.app.pollerIntervals.health | quote }}
  RE_USAGE_POLL_INTERVAL: {{ .Values.app.pollerIntervals.usage | quote }}
  RE_COLLECTION_TIMEOUT: {{ .Values.app.reCollectionTimeout | quote }}

  # Collection history retention
  RETENTION_MAX_AGE: {{ .Values.app.retentionMaxAge | quote }}
  RETENTION_RUN_INTERVAL: {{ .Values.app.retentionRunInterval | quote }}

  # Stale-request maintenance
  MAINTENANCE_RUN_INTERVAL: {{ .Values.app.maintenanceRunInterval | quote }}
