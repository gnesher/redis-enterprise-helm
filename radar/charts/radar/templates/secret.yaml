{{/*
Database credentials Secret — created only when database.existingSecret is not set.
Supports three cases:
  1. postgresql.enabled=true  → DATABASE_URL constructed from postgresql.auth values
  2. database.url is set      → DATABASE_URL taken verbatim from values
  3. Both absent              → fails with a clear error (existingSecret must be provided)
*/}}
{{- if not .Values.database.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "radar.fullname" . }}-database
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "radar.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.postgresql.enabled }}
  {{- $url := include "radar.postgresql.url" . }}
  {{ .Values.database.urlSecretKey }}: {{ $url | b64enc | quote }}
  {{ .Values.database.runtimeUrlSecretKey }}: {{ $url | b64enc | quote }}
  {{- else }}
  {{ .Values.database.urlSecretKey }}: {{ required "database.url is required when postgresql.enabled is false and database.existingSecret is not set" .Values.database.url | b64enc | quote }}
  {{- if .Values.database.runtimeUrl }}
  {{ .Values.database.runtimeUrlSecretKey }}: {{ .Values.database.runtimeUrl | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{/*
Credentials Secret — created only when credentials.existingSecret is not set AND
at least one credential value is provided:
  - credentials.encryptionKey → CREDENTIAL_ENCRYPTION_KEY (+ version), legacy LDAP/SAML path
  - credentials.kek           → CREDENTIAL_KEK (32-byte file-backed KEK), mounted into both pods
If neither is provided, the KEK is generated per-pod (ephemeral — not safe for real data).
*/}}
{{- if and (not .Values.credentials.existingSecret) (or .Values.credentials.encryptionKey .Values.credentials.kek) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "radar.fullname" . }}-credentials
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "radar.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.credentials.encryptionKey }}
  {{ .Values.credentials.encryptionKeySecretKey }}: {{ .Values.credentials.encryptionKey | b64enc | quote }}
  {{ .Values.credentials.encryptionKeyVersionSecretKey }}: {{ .Values.credentials.encryptionKeyVersion | b64enc | quote }}
  {{- end }}
  {{- if .Values.credentials.kek }}
  {{ .Values.credentials.kekSecretKey }}: {{ .Values.credentials.kek | b64enc | quote }}
  {{- end }}
{{- end }}
{{/*
LaunchDarkly Secret — created only when launchDarkly.existingSecret is not set
AND an inline launchDarkly.sdkKey is provided.
*/}}
{{- if and (not .Values.launchDarkly.existingSecret) .Values.launchDarkly.sdkKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "radar.launchDarklySecretName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "radar.labels" . | nindent 4 }}
type: Opaque
data:
  LAUNCHDARKLY_SDK_KEY: {{ .Values.launchDarkly.sdkKey | b64enc | quote }}
{{- end }}
