suite: workload identity service accounts
templates:
  - templates/serviceaccount.yaml
  - templates/deployment-api.yaml
  - templates/deployment-worker.yaml
  - templates/job-migrate.yaml
  - templates/configmap.yaml
  - templates/secret.yaml

tests:
  - it: renders runtime and migrate service accounts with workload identity annotations
    template: templates/serviceaccount.yaml
    set:
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
      serviceAccount:
        name: radar
        annotations:
          iam.gke.io/gcp-service-account: radar-staging@example-project.iam.gserviceaccount.com
        migrate:
          annotations:
            iam.gke.io/gcp-service-account: radar-staging-mig@example-project.iam.gserviceaccount.com
    asserts:
      - equal:
          path: metadata.name
          value: radar
        documentIndex: 0
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: radar-staging@example-project.iam.gserviceaccount.com
        documentIndex: 0
      - equal:
          path: automountServiceAccountToken
          value: false
        documentIndex: 0
      - equal:
          path: metadata.name
          value: radar-flyway-migrator
        documentIndex: 1
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: radar-staging-mig@example-project.iam.gserviceaccount.com
        documentIndex: 1
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
        documentIndex: 1
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-1"
        documentIndex: 1
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded
        documentIndex: 1
      - equal:
          path: automountServiceAccountToken
          value: false
        documentIndex: 1

  - it: migration service account follows bundled postgres hook phase
    template: templates/serviceaccount.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.password: testpass
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
        documentIndex: 1
      - equal:
          path: automountServiceAccountToken
          value: false
        documentIndex: 1

  - it: api uses runtime service account
    template: templates/deployment-api.yaml
    set:
      serviceAccount.name: radar
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: radar
      - isNull:
          path: spec.template.spec.automountServiceAccountToken

  - it: api enables service account token automount for workload identity
    template: templates/deployment-api.yaml
    set:
      serviceAccount:
        name: radar
        annotations:
          iam.gke.io/gcp-service-account: radar-staging@example-project.iam.gserviceaccount.com
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: radar
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true

  - it: worker uses runtime service account
    template: templates/deployment-worker.yaml
    set:
      serviceAccount.name: radar
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: radar
      - isNull:
          path: spec.template.spec.automountServiceAccountToken

  - it: worker enables service account token automount for workload identity
    template: templates/deployment-worker.yaml
    set:
      serviceAccount:
        name: radar
        annotations:
          iam.gke.io/gcp-service-account: radar-staging@example-project.iam.gserviceaccount.com
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: radar
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true

  - it: migrate uses migration service account
    template: templates/job-migrate.yaml
    set:
      serviceAccount.name: radar
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: radar-flyway-migrator
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: migrate enables service account token automount for workload identity
    template: templates/job-migrate.yaml
    set:
      serviceAccount:
        name: radar
        migrate:
          annotations:
            iam.gke.io/gcp-service-account: radar-staging-mig@example-project.iam.gserviceaccount.com
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: radar-flyway-migrator
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true

  - it: migrate falls back to default service account when service accounts are external
    template: templates/job-migrate.yaml
    set:
      serviceAccount.create: false
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default

  - it: migrate uses explicit external service account override
    template: templates/job-migrate.yaml
    set:
      serviceAccount.create: false
      serviceAccount.migrate.name: existing-migrator
      database.url: "postgres://user:pass@db:5432/radar"
      database.host: db
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: existing-migrator
