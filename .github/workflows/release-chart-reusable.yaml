name: Release Helm Chart Reusable

on:
  workflow_call:
    inputs:
      chart_name:
        description: Human-readable chart name for logs and workflow names.
        required: true
        type: string
      chart_path:
        description: Path to the chart directory, for example charts/my-chart.
        required: true
        type: string
      tag_prefix:
        description: Prefix for the git tag, for example my-chart.
        required: true
        type: string
      index_dir:
        description: >-
          gh-pages directory whose index.yaml lists this chart, for example
          "ai" (served at helm.redis.io/<index_dir>). Defaults to ai to keep
          existing callers unchanged.
        required: false
        default: ai
        type: string

jobs:
  release:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    outputs:
      changed_charts: ${{ steps.publish-index.outputs.changed_charts }}
      chart_version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Verify workflow runs from master
        run: |
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "This workflow can only be run from master. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Verify chart exists
        run: |
          test -f "${{ inputs.chart_path }}/Chart.yaml"

      - name: Extract version from Helm chart metadata
        id: extract-version
        run: |
          VERSION=$(grep '^version:' "${{ inputs.chart_path }}/Chart.yaml" | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version for ${{ inputs.chart_name }}: $VERSION"

      - name: Create and push release tag
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          TAG_NAME="${{ inputs.tag_prefix }}-$VERSION"

          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

          echo "Created and pushed tag: $TAG_NAME"

      - name: Prepare isolated chart directory
        run: |
          rm -rf .release-charts
          mkdir -p .release-charts
          cp -R "${{ inputs.chart_path }}" ".release-charts/${{ inputs.tag_prefix }}"

      - name: Write chart releaser config
        run: |
          cat > cr.yaml <<'EOF'
          index-path: .cr-index/${{ inputs.index_dir }}/index.yaml
          package-path: .cr-release-packages
          pages-index-path: ${{ inputs.index_dir }}/index.yaml
          pages-branch: gh-pages
          release-name-template: '{{ .Name }}-{{ .Version }}'
          EOF

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.9.2

      - name: Install chart releaser
        uses: helm/chart-releaser-action@v1
        with:
          install_only: true
          config: cr.yaml
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Package chart
        run: |
          cr package ".release-charts/${{ inputs.tag_prefix }}" --config cr.yaml
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Upload chart release
        run: |
          owner=$(cut -d '/' -f 1 <<< "$GITHUB_REPOSITORY")
          repo=$(cut -d '/' -f 2 <<< "$GITHUB_REPOSITORY")
          cr upload \
            --owner "$owner" \
            --git-repo "$repo" \
            --commit "${{ github.sha }}" \
            --skip-existing \
            --config cr.yaml
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Ensure Pages index directory exists
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${CR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$tmpdir"

          mkdir -p "$tmpdir/${{ inputs.index_dir }}"
          touch "$tmpdir/${{ inputs.index_dir }}/.gitkeep"

          if [[ -n "$(git -C "$tmpdir" status --short)" ]]; then
            git -C "$tmpdir" config user.name "$GITHUB_ACTOR"
            git -C "$tmpdir" config user.email "$GITHUB_ACTOR@users.noreply.github.com"
            git -C "$tmpdir" add "${{ inputs.index_dir }}/.gitkeep"
            git -C "$tmpdir" commit -m "Initialize ${{ inputs.index_dir }} Helm repository directory"
            git -C "$tmpdir" push origin gh-pages
          fi
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Update Helm repository index
        id: publish-index
        run: |
          owner=$(cut -d '/' -f 1 <<< "$GITHUB_REPOSITORY")
          repo=$(cut -d '/' -f 2 <<< "$GITHUB_REPOSITORY")
          git fetch origin gh-pages
          mkdir -p ".cr-index/${{ inputs.index_dir }}"
          cr index \
            --owner "$owner" \
            --git-repo "$repo" \
            --push \
            --config cr.yaml
          echo "changed_charts=${{ inputs.chart_name }}" >> "$GITHUB_OUTPUT"
        env:
          CR_TOKEN: "${{ github.token }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    needs:
      - release
    if: needs.release.outputs.changed_charts != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
