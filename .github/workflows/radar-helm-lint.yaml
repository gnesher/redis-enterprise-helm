name: Radar Helm Lint

on:
  pull_request:
    paths:
      - 'radar/**'
      - '.github/workflows/radar-helm-lint.yaml'
  push:
    branches:
      - master
    paths:
      - 'radar/**'
      - '.github/workflows/radar-helm-lint.yaml'

jobs:
  lint-radar-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.9.2

      - name: Lint all Radar Helm charts
        shell: bash
        run: |
          set -euo pipefail

          chart_count=0

          for chart_dir in radar/charts/*; do
            if [[ -d "$chart_dir" && -f "$chart_dir/Chart.yaml" ]]; then
              chart_count=$((chart_count + 1))
              echo "Linting $chart_dir"
              helm lint "$chart_dir"
            fi
          done

          # The radar chart is synced from the radar application repository
          # per release; until the first sync lands, an empty radar/charts/
          # is expected and must not fail this gate.
          if [[ "$chart_count" -eq 0 ]]; then
            echo "No Radar charts found under radar/charts/ (none synced yet)"
          fi
